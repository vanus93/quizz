<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Online Responsive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%233b82f6%22/><text x=%2250%22 y=%2268%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22>Q</text></svg>">
    <!-- Library PapaParse untuk Parsing CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div class="app-container">
        
        <!-- 1. HALAMAN SETUP / INPUT LINK -->
        <div id="setupContainer">
            <h2>Mulai Kuis</h2>
            <p>Masukkan URL atau ID Google Sheet soal kamu</p>
            <div class="input-group">
                <input type="text" id="sheetInput" placeholder="Tempel link Google Sheet di sini..." />
                <button class="btn-primary" onclick="startGame()">Mulai Kuis</button>
            </div>
        </div>

        <!-- 2. HALAMAN KUIS -->
        <div id="quizContainer" class="hidden">
            <div id="questionText" class="question-header">Memuat soal...</div>
            <div id="optionsContainer" class="options-grid">
                <!-- Tombol Opsi Jawaban di-generate via JavaScript -->
            </div>
        </div>

        <!-- 3. HALAMAN RINGKASAN HASIL -->
        <div id="quizSummary" class="hidden">
            <div class="summary-header">
                <h2>Hasil Kuis</h2>
                <div id="scoreText" class="score-badge">0 / 0</div>
                <div id="percentageText" class="percentage-badge">Nilai: 0%</div>
            </div>
            
            <div id="summaryDetails" class="summary-list">
                <!-- Detail Jawaban di-generate via JavaScript -->
            </div>

            <button class="btn-primary" onclick="resetQuiz()">Coba Lagi</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
