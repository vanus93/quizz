<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Kuis Web</title>
    <!-- Import File CSS Utama -->
    <link rel="stylesheet" href="style.css">
    <!-- PapaParse CDN untuk membaca data CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>Kuis Online</h1>

        <!-- Form Input Link Google Sheet -->
        <div class="card" id="setupContainer">
            <label for="sheetInput">Masukkan Link / ID Google Sheet:</label>
            <input type="text" id="sheetInput" placeholder="Tempelkan link atau ID..." 
                   value=" ">
            <button id="startBtn" onclick="startGame()">Mulai Game</button>
        </div>

        <!-- Area Main Game / Soal -->
        <div id="quizContainer" class="card hidden">
            <h2 id="questionText">Memuat soal...</h2>
            <div id="optionsContainer"></div>
        </div>

        <!-- Area Resume / Rekap Hasil Akhir -->
        <div id="quizSummary" class="card hidden">
            <h2>🎉 Resume Hasil Kuis</h2>
            <div class="score-box">
                <p>Skor Anda:</p>
                <h1 id="scoreText">0 / 0</h1>
                <p id="percentageText">0%</p>
            </div>
            <h3>Detail Jawaban:</h3>
            <div id="summaryDetails"></div>
            <button onclick="resetQuiz()" style="margin-top: 20px;">Main Lagi</button>
        </div>
    </div>

    <!-- Import File JavaScript Utama -->
    <script src="script.js"></script>
</body>
</html>
